// --- PILL RAIN ---------------------------------------------------------------
function makePillSVG(color, size) {
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("width", size);
  svg.setAttribute("height", size * 0.5);
  svg.setAttribute("viewBox", "0 0 60 30");
  svg.setAttribute("fill", "none");
  svg.setAttribute("stroke", color);
  svg.setAttribute("stroke-width", "2.5");
  const rect = document.createElementNS(ns, "rect");
  rect.setAttribute("x","2"); rect.setAttribute("y","2");
  rect.setAttribute("width","56"); rect.setAttribute("height","26"); rect.setAttribute("rx","13");
  const line = document.createElementNS(ns, "line");
  line.setAttribute("x1","30"); line.setAttribute("y1","2");
  line.setAttribute("x2","30"); line.setAttribute("y2","28");
  svg.appendChild(rect); svg.appendChild(line);
  return svg;
}

function createRain(container) {
  const colors = ["#FF0000","#FFD700","#00FF00"];
  for (let i = 0; i < 28; i++) {
    const wrap = document.createElement("div");
    const color = colors[i % 3];
    wrap.style.cssText = `position:absolute;left:${(i*3.6)%95}%;top:-40px;animation:fall ${6+(i%5)}s linear ${(i*0.41)%8}s infinite;pointer-events:none;z-index:0;filter:drop-shadow(0 0 3px ${color});`;
    wrap.appendChild(makePillSVG(color, 26));
    container.appendChild(wrap);
  }
}

// --- CALCULATE ---------------------------------------------------------------
function calculate(sub, toleranceKey, weight, gender, targetBAC) {
  const mult = TOLERANCE[toleranceKey].mult;
  let dose = null, unit = sub.unit, extra = [], capped = false, capMsg = null;

  if (sub.type === "fixed") {
    dose = sub.base * mult;
    if (sub.cap && dose > sub.cap) { dose = sub.cap; capped = true; capMsg = sub.capMsg; }
    dose = Math.round(dose * 10) / 10;

  } else if (sub.type === "mdma") {
    // Formula: (weight * 1.5 + 10) * mult
    dose = (weight * 1.5 + 10) * mult;
    if (dose > (sub.cap || 250)) { dose = sub.cap || 250; capped = true; capMsg = sub.capMsg; }
    dose = Math.round(dose);

  } else if (sub.type === "ketamine") {
    // Formula: weight * 1mg/kg * mult
    dose = weight * sub.base * mult;
    dose = Math.round(dose);

  } else if (sub.type === "alcohol") {
    // Widmark: grams_ethanol = BAC * weight * r
    const r = gender === "m" ? 0.7 : 0.6;
    const bacMap = { low: sub.bacLow, mid: sub.bacMid, high: sub.bacHigh };
    const targetBAC = bacMap[toleranceKey];
    const grams = targetBAC * weight * r;
    dose = Math.round(grams * 10) / 10;
    const mlEth = grams / 0.789;
    extra.push(`cel: ~${targetBAC}promil promila`);
    extra.push(`~ ${Math.round(mlEth / 0.4)} ml wódki 40%`);
    extra.push(`~ ${Math.round(mlEth / 0.12)} ml wina 12%`);
    extra.push(`~ ${Math.round(mlEth / 0.05)} ml piwa 5%`);

  } else if (sub.type === "weed") {
    dose = sub.base * mult;
    dose = Math.round(dose * 100) / 100;
    const thc = Math.round(dose * 250);
    extra.push(`~ ${thc} mg THC`);

  } else if (sub.type === "lean") {
    dose = Math.round(sub.base * mult);
    const codeine = Math.round(dose * 2);
    const prom = Math.round(dose * 1.25);
    const alc = Math.round(dose * 0.07 * 10) / 10;
    extra.push(`Kodeina: ${codeine} mg`);
    extra.push(`Prometazyna: ${prom} mg`);
    extra.push(`Alkohol: ${alc} g`);
    if (toleranceKey === "high") {
      capped = true;
      capMsg = "Dawka mocna LEAN: ryzyko przedawkowania Prometazyny (silna sedacja, arytmia serca). 150ml to absolutne maksimum.";
    }
  }

  return { dose, unit, extra, capped, capMsg };
}

  const genderField = makeField("płeć", "gender");
  const bacField    = makeField("cel (promile)", "number", 1.2, {min:0.1,max:4,step:0.1});
  bacField.style.display = "none"; // now auto-calculated from tolerance
  // bacField hidden permanently - BAC determined by tolerance level
  inputsRow.appendChild(weightField);
  inputsRow.appendChild(genderField);
  inputsRow.appendChild(bacField);

  // -- result area
  const resultArea = el("div","position:relative;z-index:1;margin-top:0.5rem;");
  panel.appendChild(resultArea);

  // -- render
  function render() {
    const sub = SUBSTANCES.find(s => s.id === state.subId);
    // BAC field always hidden now - determined by tolerance
    bacField.style.display = "none";
    resultArea.innerHTML = "";
    if (!sub) return;

    const tol = TOLERANCE[state.tolerance];
    const { dose, unit, extra, capped, capMsg } = calculate(sub, state.tolerance, state.weight, state.gender, state.bac);

    // main result box
    const box = el("div",`border:1px solid ${tol.color};padding:1.5rem;background:rgba(0,0,0,0.6);margin-bottom:1rem;`);
    box.className = "result-block";
    box.appendChild(el("div","font-family:'VT323',monospace;font-size:0.8rem;color:#00AA44;letter-spacing:0.2em;margin-bottom:0.6rem;","wynik analizy"));

    const doseEl = el("div",`font-family:'VT323',monospace;font-size:clamp(2.5rem,8vw,4rem);color:${tol.color};text-shadow:0 0 15px ${tol.color}99;letter-spacing:0.05em;line-height:1;`);
    doseEl.textContent = `${dose} ${unit}`;
    box.appendChild(doseEl);

    box.appendChild(el("div",`font-family:'VT323',monospace;font-size:1rem;color:${tol.color};opacity:0.7;margin-top:0.2rem;`,`dawka ${tol.label.toLowerCase()} (×${tol.mult})`));

    if (extra.length) {
      const ei = el("div","margin-top:0.6rem;display:flex;flex-direction:column;gap:0.2rem;");
      extra.forEach(e => ei.appendChild(el("div","font-family:'VT323',monospace;font-size:0.95rem;color:#00AA44;",e)));
      box.appendChild(ei);
    }

    // timing
    const timing = el("div","display:flex;gap:1.5rem;margin-top:1rem;flex-wrap:wrap;");
    [["&#9201; ONSET", sub.onset], ["&#9203; CZAS DZIAŁANIA", sub.duration]].forEach(([lbl,val]) => {
      timing.appendChild(el("div","",`<span style="font-family:'VT323',monospace;font-size:0.75rem;color:#004400;letter-spacing:0.15em;">${lbl}</span><br><span style="font-family:'VT323',monospace;font-size:1rem;color:#00FF00;">${val}</span>`));
    });
    box.appendChild(timing);
    resultArea.appendChild(box);

    // cap alert
    if (capped && capMsg) {
      const ck = el("div","border:1px solid #FF0000;padding:1rem;background:rgba(255,0,0,0.06);margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#FF0000;line-height:1.6;");
      ck.className = "warn-block";
      ck.innerHTML = `&#9940; LIMIT SYSTEMOWY<br><br>${capMsg}`;
      resultArea.appendChild(ck);
    }

    // fentanyl banner
    if (sub.fentanyl) {
      const fb = el("div","border:1px solid #FF0000;padding:1rem;background:rgba(255,0,0,0.08);margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#FF0000;line-height:1.6;");
      fb.className = "warn-block";
      fb.innerHTML = "&#9760; FENTANYL  -  NAJWYŻSZE RYZYKO ZGONU<br><br>2mg (wielkość ziarnka piasku) to dawka śmiertelna. Bez testu reagentowego nie możesz być pewny składu żadnej substancji. Zawsze miej Nalokson pod ręką.";
      resultArea.appendChild(fb);
    }

    // substance warning
    if (sub.warning) {
      const wr = el("div","border:1px solid #FFD700;padding:1rem;background:rgba(255,215,0,0.04);margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#FFD700;line-height:1.6;");
      wr.innerHTML = `&#9888; UWAGA<br><br>${sub.warning}`;
      resultArea.appendChild(wr);
    }

    // redose reminder
    resultArea.appendChild(el("div","border:1px solid #002200;padding:0.8rem;background:rgba(0,20,0,0.4);font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:#004400;line-height:1.6;","&#9889; REDOSOWANIE: Odczekaj pełny czas działania zanim uznasz, że nie działa. Przedwczesne redosowanie jest najczęstszą przyczyną przedawkowania."));
  }

  // footer
  outer.appendChild(el("div","position:relative;z-index:1;max-width:700px;width:100%;padding-top:1rem;text-align:center;","<p style=\"font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#003300;letter-spacing:0.05em;line-height:1.6;font-style:italic;\">Strona ma charakter informacyjny i edukacyjny. Dawki mają charakter orientacyjny. Zawsze weryfikuj substancje testem reagentowym.</p>"));
}

buildUI();
</script>
</body>
</html>
